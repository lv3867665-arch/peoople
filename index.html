        // ============================================
        // APP PRINCIPAL
        // ============================================
        function App() {
            const [tab, setTab] = useState('chat'); 
            const [convs, setConvs] = useState([]); 
            const [sel, setSel] = useState(null); 
            const [leads, setLeads] = useState([]); 
            const [tpls, setTpls] = useState([]); 
            const [qr, setQr] = useState([]); 
            const [cfg, setCfg] = useState({}); 
            const [socket, setSocket] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);
            const [unreadCounts, setUnreadCounts] = useState({});
            const selRef = useRef(null);
            const notifAudio = useRef(null);

            useEffect(() => {
                notifAudio.current = new Audio(NOTIFICATION_SOUND);
                notifAudio.current.volume = 0.5;
            }, []);

            // Mantém selRef sempre atualizado com o telefone selecionado
            useEffect(() => { selRef.current = sel; }, [sel]);

            // Atualiza o título da aba com total de não lidas
            const totalUnread = useMemo(() => Object.values(unreadCounts).reduce((a, b) => a + b, 0), [unreadCounts]);
            useEffect(() => {
                document.title = totalUnread > 0
                    ? `(${totalUnread}) PeOople Hub`
                    : 'PeOople Hub - Painel Administrativo';
            }, [totalUnread]);

            // Ao focar na janela, zera não lidas da conversa ativa
            useEffect(() => {
                const onFocus = () => {
                    if (selRef.current) {
                        setUnreadCounts(prev => { const n = { ...prev }; delete n[selRef.current]; return n; });
                    }
                };
                window.addEventListener('focus', onFocus);
                return () => window.removeEventListener('focus', onFocus);
            }, []);

            // Ao selecionar conversa, zera as não lidas dela
            const handleSelectPhone = useCallback((phone) => {
                setSel(phone);
                setTab('chat');
                setUnreadCounts(prev => { const n = { ...prev }; delete n[phone]; return n; });
            }, []);

            useEffect(() => {
                let isMounted = true;
                
                const initSocket = () => {
                    try {
                        const s = io({ reconnectionAttempts: 5, timeout: 10000, transports: ['websocket', 'polling'] }); 
                        if (!isMounted) return;
                        setSocket(s);
                        s.on('connect', () => console.log('Socket:', s.id));
                        s.on('connect_error', (err) => console.error('Socket erro:', err));
                        s.on('conversationUpdate', (u) => { 
                            setConvs(prev => { 
                                const ex = prev.find(c => c.phone === u.phone); 
                                if (ex) return [{ ...ex, ...u }, ...prev.filter(c => c.phone !== u.phone)]; 
                                return [u, ...prev]; 
                            });
                            // Nova msg recebida de outra conversa: incrementa não lidas e toca som
                            if (u.direction === 'received' && u.phone !== selRef.current) {
                                setUnreadCounts(prev => ({ ...prev, [u.phone]: (prev[u.phone] || 0) + 1 }));
                                if (notifAudio.current) {
                                    notifAudio.current.play().catch(() => {});
                                }
                            }
                        });
                    } catch (err) {
                        console.error('Erro socket:', err);
                    }
                };
                
                initSocket();
                return () => { isMounted = false; if (socket) socket.close(); };
            }, []);

            const fetchAll = useCallback(async () => {
                try {
                    setIsLoading(true);
                    const [c, l, t, q, cfgData] = await Promise.all([
                        fetch('/api/conversations').then(r => r.ok ? r.json() : []), 
                        fetch('/api/leads').then(r => r.ok ? r.json() : []), 
                        fetch('/api/meta/templates').then(r => r.ok ? r.json() : []), 
                        fetch('/api/quick-replies').then(r => r.ok ? r.json() : []), 
                        fetch('/api/config').then(r => r.ok ? r.json() : {})
                    ]);
                    setConvs(c || []); setLeads(l || []); setTpls(t || []); setQr(q || []); setCfg(cfgData || {});
                    setIsLoading(false);
                } catch (e) {
                    console.error('Erro fetchAll:', e);
                    setError('Erro ao carregar dados');
                    setIsLoading(false);
                }
            }, []);

            // Refetch só de leads — sem recarregar tudo
            const fetchLeads = useCallback(async () => {
                try {
                    const l = await fetch('/api/leads').then(r => r.ok ? r.json() : []);
                    setLeads(l || []);
                } catch (e) {
                    console.error('Erro fetchLeads:', e);
                }
            }, []);

            // Refetch só de config
            const fetchConfig = useCallback(async () => {
                try {
                    const cfgData = await fetch('/api/config').then(r => r.ok ? r.json() : {});
                    setCfg(cfgData || {});
                } catch (e) {
                    console.error('Erro fetchConfig:', e);
                }
            }, []);

            useEffect(() => { fetchAll(); }, [fetchAll]);

            if (error) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-100">
                        <div className="bg-white p-8 rounded-2xl shadow-lg text-center">
                            <i className="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i>
                            <h2 className="text-xl font-bold text-slate-800 mb-2">Erro</h2>
                            <p className="text-slate-500 mb-4">{error}</p>
                            <button onClick={() => window.location.reload()} className="px-4 py-2 bg-purple-700 text-white rounded-lg hover:bg-purple-800">Recarregar</button>
                        </div>
                    </div>
                );
            }

            if (isLoading) {
                return <LoadingScreen />;
            }

            return (
                <ErrorBoundary>
                    <div className="flex h-screen bg-slate-100">
                        <div className="nav-sidebar w-20 bg-purple-900 flex flex-col items-center py-8 gap-6 z-50">
                            <div className="nav-logo w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center text-white text-xl font-black mb-4">P</div>
                            <button onClick={() => setTab('chat')} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${tab === 'chat' ? 'active-tab-btn' : 'text-purple-300 hover:bg-white/10'}`}><i className="fas fa-comment-dots"></i></button>
                            <button onClick={() => setTab('bulk')} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${tab === 'bulk' ? 'active-tab-btn' : 'text-purple-300 hover:bg-white/10'}`}><i className="fas fa-rocket"></i></button>
                            <button onClick={() => setTab('leads')} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${tab === 'leads' ? 'active-tab-btn' : 'text-purple-300 hover:bg-white/10'}`}><i className="fas fa-users"></i></button>
                            <button onClick={() => setTab('tags')} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${tab === 'tags' ? 'active-tab-btn' : 'text-purple-300 hover:bg-white/10'}`} title="Tags"><i className="fas fa-tags"></i></button>
                            <button onClick={() => setTab('quick')} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${tab === 'quick' ? 'active-tab-btn' : 'text-purple-300 hover:bg-white/10'}`}><i className="fas fa-bolt"></i></button>
                            <button onClick={() => setTab('config')} className={`nav-config-btn w-10 h-10 rounded-xl flex items-center justify-center transition-all mt-auto ${tab === 'config' ? 'active-tab-btn' : 'text-purple-300 hover:bg-white/10'}`}><i className="fas fa-cog"></i></button>
                        </div>
                        <div className="main-content-wrap flex-1 overflow-hidden">
                            {tab === 'chat' && <ChatView conversations={convs} selectedPhone={sel} setSelectedPhone={handleSelectPhone} config={cfg} templates={tpls} quickReplies={qr} socket={socket} setConversations={setConvs} unreadCounts={unreadCounts} />}
                            {tab === 'bulk' && <BulkView leads={leads} templates={tpls} config={cfg} onLeadsUpdate={fetchLeads} />}
                            {tab === 'leads' && <LeadsView leads={leads} config={cfg} onUpd={fetchLeads} socket={socket} onChat={(p) => {
                                // Injeta uma conversa sintética se o lead ainda não tem histórico
                                setConvs(prev => {
                                    if (prev.find(c => c.phone === p)) return prev;
                                    const lead = leads.find(l => l.phone === p);
                                    return [{ phone: p, name: lead?.name || p, lastMessage: '', timestamp: new Date(), tags: lead?.tags || [] }, ...prev];
                                });
                                handleSelectPhone(p);
                            }} />}
                            {tab === 'tags' && <TagsView config={cfg} onUpd={fetchConfig} />}
                            {tab === 'quick' && <QuickView qr={qr} onUpd={fetchAll} />}
                            {tab === 'config' && <ConfigView config={cfg} onUpd={fetchConfig} />}
                        </div>
                    </div>
                </ErrorBoundary>
            );
        }

        try {
            ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        } catch (err) {
            console.error('Erro fatal:', err);
            document.getElementById('root').innerHTML = '<div style="padding:20px;text-align:center"><h2>Erro ao iniciar</h2><p>' + err.message + '</p><button onclick="location.reload()">Recarregar</button></div>';
        }
    </script>
</body>
</html>
