        function setVh() { document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px'); }
        setVh();
        window.addEventListener('resize', setVh);
    </script>

        .sidebar { width: 380px; border-right: 1px solid #e2e8f0; background: white; display: flex; flex-direction: column; height: 100vh; }
        .chat-area { flex: 1; display: flex; flex-direction: column; height: 100vh; background: #f1f5f9; position: relative; }
        .message-bubble { max-width: 100%; min-width: 80px; padding: 10px 14px; border-radius: 12px; margin-bottom: 6px; font-size: 14.5px; line-height: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .message-sent { background-color: #6b21a8; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message-received { background-color: white; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; }
        .peoople-logo { color: #6b21a8; font-weight: 800; font-size: 26px; letter-spacing: -1px; }
        .tag-badge { padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; margin-right: 4px; display: inline-block; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .active-tab-btn { background-color: #6b21a8 !important; color: white !important; }
        .optimistic-pending { opacity: 0.6; }
        .loading-shimmer { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .color-picker { width: 40px; height: 40px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all 0.2s; }
        .color-picker:hover { transform: scale(1.1); }
        .color-picker.selected { border-color: #6b21a8; box-shadow: 0 0 0 2px white, 0 0 0 4px #6b21a8; }
        .message-failed { background-color: #fee2e2 !important; color: #7f1d1d !important; border: 1px solid #fca5a5 !important; }
        .msg-row { display: flex; align-items: flex-end; gap: 6px; margin-bottom: 4px; }
        .msg-row.sent { flex-direction: row-reverse; }
        .msg-row.received { flex-direction: row; }
        .reply-btn { opacity: 0; transition: opacity 0.15s; background: white; border: 1px solid #e2e8f0; border-radius: 50%; width: 28px; height: 28px; min-width: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.1); color: #64748b; flex-shrink: 0; align-self: center; }
        .msg-row:hover .reply-btn { opacity: 1; }
        .reply-btn:hover { color: #6b21a8; border-color: #6b21a8; }

            /* Header do chat: nunca encolhe */
            .chat-area > div:first-child {
                flex-shrink: 0 !important;
                position: sticky !important;
                top: 0 !important;
                z-index: 10 !important;
                padding: 10px 12px !important;
            }

            .chat-area .messages-scroll {
                flex: 1 1 0% !important;
                min-height: 0 !important;
                overflow-y: auto !important;
                padding: 12px 10px !important;

            }

            .mobile-back-btn { display: flex !important; }

                width: 36px !important;

                padding: 0 !important;

                align-items: center !important;

                height: 42px !important;
                box-sizing: border-box !important;
                padding: 0 12px !important;
                font-size: 16px !important;
            }
        }
    </style>
</head>

        function translateMetaError(errorText) {
            if (!errorText) return errorText;
            // Formato: [código] título — detalhe
            const codeMatch = errorText.match(/^\[(\d+)\]/);
            if (codeMatch) {
                const code = parseInt(codeMatch[1]);
                if (META_ERROR_CODES[code]) {
                    return `Erro ${code}: ${META_ERROR_CODES[code]}`;
                }
            }
            // Tenta traduzir pelo título
            for (const [en, pt] of Object.entries(META_ERROR_TITLES)) {
                if (errorText.toLowerCase().includes(en.toLowerCase())) {
                    const codePrefix = codeMatch ? `Erro ${codeMatch[1]}: ` : '';
                    return `${codePrefix}${pt}`;
                }
            }
            return errorText;
        }

        // Comprime imagem no browser antes de enviar (reduz 5-20x o tamanho)
        const processFile = (file) => new Promise(resolve => {
            if (!file.type.startsWith('image/')) {
                // Não é imagem: só lê como base64 sem processar
                const r = new FileReader();
                r.onload = ev => resolve({ name: file.name, type: file.type, data: ev.target.result });
                r.readAsDataURL(file);
                return;
            }
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                URL.revokeObjectURL(url);
                const MAX = 1280;
                let { width, height } = img;
                if (width > MAX || height > MAX) {
                    if (width > height) { height = Math.round(height * MAX / width); width = MAX; }
                    else { width = Math.round(width * MAX / height); height = MAX; }
                }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                const data = canvas.toDataURL('image/jpeg', 0.82);
                resolve({ name: file.name.replace(/\.[^.]+$/, '.jpg'), type: 'image/jpeg', data });
            };
            img.onerror = () => {
                // Fallback: lê sem compressão
                const r = new FileReader();
                r.onload = ev => resolve({ name: file.name, type: file.type, data: ev.target.result });
                r.readAsDataURL(file);
            };
            img.src = url;
        });

        // ============================================
        // ERROR BOUNDARY
        // ============================================
        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error('React Error:', error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (

        const WindowTimer = memo(({ lastReceived }) => {
            const [t, setT] = useState(''); 
            const [exp, setExp] = useState(false);
            
            useEffect(() => {
                if (!lastReceived) return;
                const upd = () => {
                    const d = (new Date(lastReceived).getTime() + 86400000) - Date.now();
                    if (d <= 0) { setT('Expirada'); setExp(true); }
                    else { 
                        const hours = Math.floor(d/3600000);
                        const minutes = Math.floor((d%3600000)/60000);
                        setT(`${hours}h ${minutes}m`); 
                        setExp(false); 
                    }
                };
                upd(); 
                const i = setInterval(upd, 60000); 
                return () => clearInterval(i);
            }, [lastReceived]);
            
            if (!lastReceived) return null;
            return (
                <div className={`text-[10px] font-black px-2 py-0.5 rounded border ${exp ? 'bg-red-50 text-red-600 border-red-100' : 'bg-green-50 text-green-600 border-green-100'}`}>
                    {t}
                </div>
            );
        });

        const ChatView = memo(({ conversations, selectedPhone, setSelectedPhone, config, templates, quickReplies, socket, setConversations, unreadCounts }) => {
            const [messages, setMessages] = useState([]);

            const [error, setError] = useState(null);
            const [pendingTpl, setPendingTpl] = useState(null);
            const [replyTo, setReplyTo] = useState(null);
            const [hasMore, setHasMore] = useState(false);
            const [isLoadingMore, setIsLoadingMore] = useState(false);
            const [showSearch, setShowSearch] = useState(false);
            const [searchText, setSearchText] = useState('');
            const searchInputRef = useRef(null);
            const [mobileShowChat, setMobileShowChat] = useState(false);
            const [isSendingLocation, setIsSendingLocation] = useState(false);

            const emojiRef = useRef(null);

            // Quando abre o chat no mobile, empurra um estado no histórico
            // para que o botão físico "voltar" feche o chat em vez de sair da página
            useEffect(() => {
                if (mobileShowChat) {

            useEffect(() => {
                const onPopState = (e) => {
                    if (mobileShowChat) {
                        setMobileShowChat(false);
