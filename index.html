                };
                window.addEventListener('popstate', onPopState);
                return () => window.removeEventListener('popstate', onPopState);
            }, [mobileShowChat]);
            
            const endRef = useRef(null);
            const scrollRef = useRef(null);
            const inputRef = useRef(null);
            const isBottom = useRef(true);
            const fInput = useRef(null);
            const audio = useRef(null);

            useEffect(() => {
                if (typeof window !== 'undefined') {
                    audio.current = new Audio(NOTIFICATION_SOUND);
                    audio.current.volume = 0.5;
                }
            }, []);

            useEffect(() => {
                if (!showEmoji) return;
                const handler = (e) => {
                    if (emojiRef.current && !emojiRef.current.contains(e.target)) {
                        setShowEmoji(false);
                    }
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, [showEmoji]);

            const toggleReaction = useCallback((msgId, emoji) => {
                setReactions(prev => {
                    const msgR = prev[msgId] || {};
                    const cur = msgR[emoji] || 0;
                    return { ...prev, [msgId]: { ...msgR, [emoji]: cur > 0 ? 0 : 1 } };
                });
                setReactionTarget(null);
            }, []);

            useEffect(() => {
                if (!reactionTarget) return;
                const handler = (e) => {
                    if (!e.target.closest('.reaction-picker') && !e.target.closest('.msg-reaction-trigger')) {
                        setReactionTarget(null);
                    }
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, [reactionTarget]);

            const insertEmoji = useCallback((emoji) => {
                const input = inputRef.current;
                if (!input) { setInputText(prev => prev + emoji); return; }
                const start = input.selectionStart ?? inputText.length;
                const end = input.selectionEnd ?? inputText.length;
                const newText = inputText.substring(0, start) + emoji + inputText.substring(end);
                setInputText(newText);
                setTimeout(() => {
                    input.focus();
                    const pos = start + emoji.length;
                    input.setSelectionRange(pos, pos);
                }, 0);
            }, [inputText]);

            // Tenta achar nas conversas; se não achar, cria um contato mínimo com o próprio telefone
            const contact = useMemo(() => {
                if (!selectedPhone) return null;
                const found = (conversations || []).find(c => c.phone === selectedPhone);
                if (found) return found;
                // Lead adicionado manualmente que ainda não tem histórico de mensagens
                return { phone: selectedPhone, name: selectedPhone, lastMessage: '', tags: [] };
            }, [conversations, selectedPhone]);

            // Filtra conversas pelo texto de busca
            const filteredConversations = useMemo(() => {
                if (!searchText.trim()) return conversations || [];
                const q = searchText.trim().toLowerCase();
                return (conversations || []).filter(c =>
                    (c.name || '').toLowerCase().includes(q) ||
                    (c.phone || '').includes(q)
                );
            }, [conversations, searchText]);

            // Foca no campo de busca ao abrir
            useEffect(() => {
                if (showSearch && searchInputRef.current) {
                    setTimeout(() => searchInputRef.current?.focus(), 50);
                }
            }, [showSearch]);

            useEffect(() => {
                if (!selectedPhone) return;
                
                let isMounted = true;
                setMessages([]); 
                setIsLoading(true);
                setHasMore(false);
                setError(null);
                setReplyTo(null);
                
                if (socket && socket.connected) {
                    socket.emit('joinChat', selectedPhone);
                }
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);
                
                fetch(`/api/messages/${encodeURIComponent(selectedPhone)}?limit=50`, {
                    signal: controller.signal
                })
                    .then(res => {
                        clearTimeout(timeoutId);
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return res.json();
                    })
                    .then(data => {
                        if (!isMounted) return;
                        const msgs = Array.isArray(data) ? data : [];
                        setMessages(msgs);
                        setHasMore(msgs.length >= 50);
                        setIsLoading(false);
                        setTimeout(() => endRef.current?.scrollIntoView({ behavior: "auto" }), 100);

                        // Carrega mídia das mensagens em lotes — imediatamente para as últimas 5,
                        // e com delay de 12s para as demais (dá tempo do background download terminar)
                        const mediaMessages = msgs.filter(m => m.hasMedia);
                        if (mediaMessages.length > 0 && isMounted) {
                            const loadMedia = async (batch, delay) => {
                                if (delay) await new Promise(r => setTimeout(r, delay));
                                if (!isMounted) return;
                                for (const pm of batch) {
                                    try {
                                        const r = await fetch(`/api/messages/media/${pm._id}`);
                                        if (!r.ok) continue;
                                        const d = await r.json();
                                        if (d.mediaData && isMounted) {
                                            setMessages(prev => prev.map(m =>
                                                String(m._id) === String(pm._id) ? { ...m, mediaData: d.mediaData } : m
                                            ));
                                        }
                                    } catch (e) {}
                                }
                            };
                            // últimas 5 mensagens com mídia: carrega imediatamente (mais visíveis)
                            const recent = mediaMessages.slice(-5);
                            const older = mediaMessages.slice(0, -5);
                            loadMedia(recent, 0);
                            if (older.length > 0) loadMedia(older, 500);
                        }
                    })
                    .catch(err => {
                        clearTimeout(timeoutId);
                        if (!isMounted) return;
                        console.error('Erro carregando mensagens:', err);
                        setError(err.name === 'AbortError' ? 'Timeout ao carregar' : err.message);
                        setIsLoading(false);
                    });
                    
                return () => { 
                    isMounted = false; 
                    controller.abort();
                };
            }, [selectedPhone, socket]);

            useEffect(() => {
                if (!socket || !selectedPhone) return;
                
                const hNew = (msg) => {
                    if (msg.phone !== selectedPhone) return;
                    if (msg.direction === 'received' && audio.current) {
                        audio.current.play().catch(() => {});
                    }
                    setMessages(prev => {
                        if (prev.find(m => m.wamid === msg.wamid)) return prev;
                        return [...prev.filter(m => !(m.isOptimistic && m.text === msg.text)), msg];
                    });
                    if (isBottom.current) {
                        setTimeout(() => endRef.current?.scrollIntoView({ behavior: "smooth" }), 50);
                    }
                };
                
                const hStatus = (d) => {
                    setMessages(prev => prev.map(m => {
                        if (m.wamid !== d.wamid) return m;
                        const upd = { ...m, status: d.status };
                        if (d.error) upd.error = d.error;
                        return upd;
                    }));
                };

                // Atualiza a mídia quando o servidor terminar o download (sem travar a mensagem)
                const hMedia = (d) => {
                    setMessages(prev => prev.map(m => String(m._id) === String(d._id) ? { ...m, mediaData: d.mediaData } : m));
                };
                
                socket.on('newMessage', hNew); 
                socket.on('statusUpdate', hStatus);
                socket.on('mediaUpdate', hMedia);
                
                return () => { 
                    socket.off('newMessage', hNew); 
                    socket.off('statusUpdate', hStatus);
                    socket.off('mediaUpdate', hMedia);
                };
            }, [socket, selectedPhone]);

            const loadMoreMessages = useCallback(async () => {
                if (isLoadingMore || !hasMore || !selectedPhone || messages.length === 0) return;
                setIsLoadingMore(true);
                const oldest = messages[0];
                try {
                    const res = await fetch(`/api/messages/${encodeURIComponent(selectedPhone)}?limit=50&before=${encodeURIComponent(oldest.timestamp)}`);
                    if (!res.ok) throw new Error();
                    const older = await res.json();
                    if (older.length < 50) setHasMore(false);
                    if (older.length === 0) { setIsLoadingMore(false); return; }
                    const scrollEl = scrollRef.current;
                    const prevHeight = scrollEl?.scrollHeight || 0;
                    setMessages(prev => [...older, ...prev]);
                    requestAnimationFrame(() => {
                        if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight - prevHeight;
                    });
                    const mediaOlder = older.filter(m => m.hasMedia);
                    if (mediaOlder.length > 0) {
                        for (const pm of mediaOlder) {
                            try {
                                const r = await fetch(`/api/messages/media/${pm._id}`);
                                if (!r.ok) continue;
                                const d = await r.json();
                                if (d.mediaData) setMessages(prev => prev.map(m => String(m._id) === String(pm._id) ? { ...m, mediaData: d.mediaData } : m));
                            } catch {}
                        }
                    }
                } catch {}
                setIsLoadingMore(false);
            }, [isLoadingMore, hasMore, selectedPhone, messages]);

            const handleScroll = useCallback((e) => {
                const el = e.target;
                isBottom.current = el.scrollHeight - el.scrollTop - el.clientHeight < 50;
                if (el.scrollTop < 80 && hasMore && !isLoadingMore) {
                    loadMoreMessages();
                }
            }, [hasMore, isLoadingMore, loadMoreMessages]);

            const send = async (tpl = null, qr = null) => {
                if (isSending || (!inputText && !file && !tpl && !qr)) return;
                
                if (tpl?.components?.some(c => c.type === 'HEADER' && c.format === 'IMAGE') && !file) { 
                    setPendingTpl(tpl);
                    setShowTpl(false); 
                    fInput.current?.click(); 
                    return; 
                }
                
                setIsSending(true);
                const txt = qr ? qr.text : (tpl ? (tpl.components?.find(c=>c.type==='BODY')?.text || `Template: ${tpl.name}`) : inputText);
                const optId = 'opt-' + Date.now();
                
                const optimisticMsg = { 
                    _id: optId, 
                    phone: selectedPhone, 
                    text: txt, 
                    direction: 'sent', 
                    timestamp: new Date().toISOString(), 
                    status: 'pending', 
                    isOptimistic: true 
                };
                
                const currentReplyTo = replyTo;
                setMessages(prev => [...prev, optimisticMsg]);
                setInputText('');
                setFile(null);
                setShowTpl(false);
                setShowQr(false);
                setReplyTo(null);
                
                requestAnimationFrame(() => {
                    endRef.current?.scrollIntoView({ behavior: "smooth" });
                });

                fetch('/api/messages/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: selectedPhone, 
                        messageText: qr ? qr.text : (tpl ? (tpl.components?.find(c=>c.type==='BODY')?.text || tpl.name) : txt), 
                        templateName: tpl?.name,
                        languageCode: tpl?.language || undefined,
                        mediaData: qr?.mediaData || file?.data,
                        mediaType: qr?.mediaType || file?.type,
                        fileName: qr?.mediaName || file?.name,
                        replyToWamid: currentReplyTo?.wamid || undefined
                    })
                })
                .then(async (res) => {
                    if (!res.ok) {
                        const errData = await res.json().catch(() => ({}));
                        throw new Error(errData.error || `HTTP ${res.status}`);
                    }
                })
                .catch((err) => {
                    console.error('Erro envio:', err);
                    setMessages(prev => prev.map(m => 
                        m._id === optId ? { ...m, status: 'failed', error: err.message } : m
                    ));
                })
                .finally(() => {
                    setIsSending(false);
                    setTimeout(() => inputRef.current?.focus(), 150);
                });
            };

            const sendLocation = useCallback(() => {
                if (isSendingLocation || !selectedPhone) return;
                if (!navigator.geolocation) {
                    alert('Seu navegador não suporta geolocalização.');
                    return;
                }
                setIsSendingLocation(true);
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        const { latitude: lat, longitude: lng } = pos.coords;
                        const optId = 'opt-loc-' + Date.now();
                        const optimisticMsg = {
                            _id: optId,
                            phone: selectedPhone,
                            text: '📍 Localização compartilhada',
                            direction: 'sent',
                            type: 'location',
                            timestamp: new Date().toISOString(),
                            status: 'pending',
                            isOptimistic: true,
                            locationData: { lat, lng, name: null, address: null }
                        };
                        setMessages(prev => [...prev, optimisticMsg]);
                        requestAnimationFrame(() => endRef.current?.scrollIntoView({ behavior: 'smooth' }));
                        try {
                            const res = await fetch('/api/messages/send', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ phone: selectedPhone, lat, lng })
                            });
                            if (!res.ok) {
                                const err = await res.json().catch(() => ({}));
                                throw new Error(err.error || `HTTP ${res.status}`);
                            }
                        } catch (err) {
                            setMessages(prev => prev.map(m =>
                                m._id === optId ? { ...m, status: 'failed', error: err.message } : m
                            ));
                        } finally {
                            setIsSendingLocation(false);
                        }
                    },
                    (err) => {
                        setIsSendingLocation(false);
                        const msgs = {
                            1: 'Permissão de localização negada. Permita o acesso nas configurações do navegador.',
                            2: 'Não foi possível obter a localização.',
                            3: 'Tempo esgotado ao obter localização.'
                        };
                        alert(msgs[err.code] || 'Erro ao obter localização.');
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }, [isSendingLocation, selectedPhone]);

            useEffect(() => {
                if (file && pendingTpl) {
                    const tpl = pendingTpl;
                    setPendingTpl(null);
                    send(tpl);
                }
            }, [file, pendingTpl]);

            if (error) {
                return (
                    <div className="flex h-full w-full items-center justify-center">
                        <div className="text-center p-8 bg-red-50 rounded-2xl border border-red-200 max-w-md">
                            <i className="fas fa-exclamation-circle text-4xl text-red-500 mb-4"></i>
                            <p className="text-red-600 font-medium mb-4">{error}</p>
                            <button 
                                onClick={() => window.location.reload()}
                                className="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700"
                            >
                                Tentar Novamente
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-full w-full">
                    <div className={`sidebar ${mobileShowChat ? 'mobile-hidden' : ''}`}>
                        <div className="p-4 border-b flex justify-between items-center gap-2">
                            {showSearch ? (
                                <div className="flex-1 flex items-center gap-2">
                                    <input
                                        ref={searchInputRef}
                                        value={searchText}
                                        onChange={e => setSearchText(e.target.value)}
                                        placeholder="Buscar cliente por nome..."
                                        className="flex-1 px-4 py-2 bg-slate-100 rounded-full text-sm outline-none focus:ring-2 focus:ring-purple-400"
                                        onKeyDown={e => { if (e.key === 'Escape') { setShowSearch(false); setSearchText(''); } }}
                                    />
                                    <button
                                        onClick={() => { setShowSearch(false); setSearchText(''); }}
                                        className="w-8 h-8 rounded-full bg-slate-100 hover:bg-red-100 flex items-center justify-center text-slate-500 hover:text-red-500 shrink-0"
                                        title="Fechar busca"
                                    >
                                        <i className="fas fa-times text-sm"></i>
                                    </button>
                                </div>
                            ) : (
                                <>
                                    <div className="peoople-logo">PeOople</div>
                                    <button
                                        onClick={() => setShowSearch(true)}
                                        className="w-8 h-8 rounded-full bg-slate-100 hover:bg-purple-100 flex items-center justify-center text-slate-500 hover:text-purple-700 transition-colors"
                                        title="Buscar cliente"
                                    >
                                        <i className="fas fa-search text-sm"></i>
                                    </button>
                                </>
                            )}
                        </div>
                        <div className="overflow-y-auto flex-1">
                            {filteredConversations.length === 0 ? (
                                <div className="p-8 text-center text-slate-400">
                                    <i className="fas fa-comments text-3xl mb-2"></i>
                                    <p>{searchText ? 'Nenhum resultado' : 'Nenhuma conversa'}</p>
                                </div>
                            ) : (
                                filteredConversations.map(c => (
                                    <div 
                                        key={c.phone} 
                                        onClick={() => { setSelectedPhone(c.phone); setMobileShowChat(true); }} 
                                        className={`flex items-center p-4 cursor-pointer hover:bg-slate-50 border-b ${selectedPhone === c.phone ? 'bg-purple-50 border-r-4 border-r-purple-700' : (unreadCounts?.[c.phone] > 0 ? 'bg-purple-50/40' : '')}`}
                                    >
                                        <div className="relative mr-3 shrink-0">
                                            <div className="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center text-purple-700 font-bold">
                                                {(c.name || c.phone || '?')[0].toUpperCase()}
                                            </div>
                                            {(unreadCounts?.[c.phone] || 0) > 0 && (
                                                <span className="absolute -top-1 -right-1 bg-purple-700 text-white text-[10px] font-black rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1 shadow">
                                                    {unreadCounts[c.phone] > 99 ? '99+' : unreadCounts[c.phone]}
                                                </span>
                                            )}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex justify-between items-center mb-1">
                                                <span className={`truncate ${(unreadCounts?.[c.phone] || 0) > 0 ? 'font-black text-slate-900' : 'font-bold text-slate-800'}`}>{c.name || c.phone}</span>
                                                <WindowTimer lastReceived={c.lastReceived} />
                                            </div>
                                            <div className={`text-sm truncate ${(unreadCounts?.[c.phone] || 0) > 0 ? 'font-semibold text-slate-700' : 'text-slate-500'}`}>{c.lastMessage || 'Sem mensagens'}</div>
                                            <div className="mt-2 flex flex-wrap gap-1">
                                                {(c.tags || []).map(t => (
                                                    <span 
                                                        key={t} 
                                                        className="tag-badge" 
                                                        style={{ backgroundColor: config?.tagColors?.[t] || '#e2e8f0' }}
                                                    >
                                                        {t}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                    <div className={`chat-area ${!mobileShowChat ? 'mobile-hidden' : ''}`}>
                        {selectedPhone ? (
                            contact ? (
                                <>
                                    <div className="p-4 bg-white border-b flex items-center justify-between shadow-sm z-10">
                                        <div className="flex items-center">
                                            <button
                                                className="mobile-back-btn w-9 h-9 rounded-full bg-slate-100 items-center justify-center text-slate-600 hover:bg-purple-100 hover:text-purple-700 mr-2 shrink-0"
                                                onClick={() => setMobileShowChat(false)}
                                                title="Voltar"
                                            >
                                                <i className="fas fa-arrow-left text-sm"></i>
                                            </button>
                                            <div className="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center mr-3 text-white font-bold shrink-0">
                                                {(contact.name || '?')[0].toUpperCase()}
                                            </div>
                                            <div>
                                                <div className="font-bold text-slate-800">{contact.name || contact.phone}</div>
                                                <div className="text-xs text-slate-500">{contact.phone}</div>
                                            </div>
                                        </div>
                                        <WindowTimer lastReceived={contact.lastReceived} />
                                    </div>
                                    <div 
                                        className="flex-1 overflow-y-auto p-6 flex flex-col messages-scroll" 
                                        ref={scrollRef} 
                                        onScroll={handleScroll}
                                        style={{minHeight: 0}}
                                    >
                                        {isLoadingMore && (
                                            <div className="flex justify-center py-2 mb-2">
                                                <div className="flex items-center gap-2 text-xs text-slate-400 bg-white px-3 py-1.5 rounded-full shadow-sm">
                                                    <i className="fas fa-circle-notch animate-spin"></i> Carregando mensagens antigas...
                                                </div>
                                            </div>
                                        )}
                                        {!isLoadingMore && hasMore && (
                                            <div className="flex justify-center py-2 mb-2">
                                                <button onClick={loadMoreMessages} className="text-xs text-purple-600 bg-white px-3 py-1.5 rounded-full shadow-sm hover:bg-purple-50 border border-purple-100">
                                                    <i className="fas fa-chevron-up mr-1"></i> Carregar mensagens anteriores
                                                </button>
                                            </div>
                                        )}
                                        {isLoading ? (
                                            <div className="space-y-4">
                                                {[1,2,3].map(i => (
                                                    <div key={i} className={`w-48 h-12 rounded-xl loading-shimmer ${i%2===0?'self-end':'self-start'}`}></div>
                                                ))}
                                            </div>
                                        ) : (messages || []).length === 0 ? (
                                            <div className="flex-1 flex flex-col items-center justify-center text-slate-400">
                                                <i className="fas fa-comment-slash text-4xl mb-2"></i>
                                                <p>Sem mensagens</p>
                                            </div>
                                        ) : (
                                            (messages || []).map((m, i) => {
                                                const msgId = String(m._id || m.wamid || i);
                                                const msgReactions = reactions[msgId] || {};
                                                const activeReactions = Object.entries(msgReactions).filter(([,c]) => c > 0);
                                                return (
                                                <div key={msgId} className={`msg-row ${m.direction === 'sent' ? 'sent' : 'received'}`}>
                                                    <button className="reply-btn" onClick={() => setReplyTo(m)} title="Responder">
                                                        <i className="fas fa-reply text-xs"></i>
                                                    </button>
                                                    <div style={{display:'flex', flexDirection:'column', alignItems: m.direction==='sent'?'flex-end':'flex-start', position:'relative', maxWidth:'70%'}}>
                                                        {reactionTarget === msgId && (
                                                            <div className="reaction-picker" style={{[m.direction==='sent'?'right':'left']: 0}}>
                                                                {QUICK_REACTIONS.map(emoji => (
                                                                    <button key={emoji} className="reaction-emoji-btn" onClick={() => toggleReaction(msgId, emoji)} title={emoji}>{emoji}</button>
                                                                ))}
                                                            </div>
                                                        )}
                                                    <div 
                                                        className={`message-bubble msg-reaction-trigger ${m.status === 'failed' ? 'message-failed' : m.direction === 'sent' ? 'message-sent' : 'message-received'} ${m.status === 'pending' ? 'optimistic-pending' : ''}`}
                                                        onDoubleClick={() => setReactionTarget(prev => prev === msgId ? null : msgId)}
                                                    >
                                                        {m.type === 'location' && m.locationData ? (
                                                            <a
                                                                href={`https://maps.google.com/?q=${m.locationData.lat},${m.locationData.lng}`}
                                                                target="_blank"
                                                                rel="noopener noreferrer"
                                                                className="block mb-2 rounded-xl overflow-hidden hover:opacity-80 transition-opacity"
                                                                style={{textDecoration:'none'}}
                                                            >
                                                                <div className={`flex items-center gap-3 p-3 rounded-xl ${m.direction==='sent'?'bg-white/15':'bg-slate-100'}`}>
                                                                    <div className="w-10 h-10 rounded-full bg-green-500 flex items-center justify-center flex-shrink-0 shadow">
                                                                        <i className="fas fa-map-marker-alt text-white"></i>
                                                                    </div>
                                                                    <div className="min-w-0">
                                                                        {m.locationData.name && <div className="font-bold text-sm truncate">{m.locationData.name}</div>}
                                                                        {m.locationData.address && <div className="text-xs opacity-75 truncate">{m.locationData.address}</div>}
                                                                        <div className="text-[10px] opacity-60">{Number(m.locationData.lat).toFixed(5)}, {Number(m.locationData.lng).toFixed(5)}</div>
                                                                        <div className={`text-xs font-bold mt-0.5 ${m.direction==='sent'?'text-blue-200':'text-blue-500'}`}>Ver no Google Maps →</div>
                                                                    </div>
                                                                </div>
                                                            </a>
                                                        ) : m.mediaData ? (
                                                            m.type === 'image' ? 
                                                                <img src={m.mediaData} className="rounded-lg mb-2 max-w-full max-h-64 object-cover cursor-pointer" alt="Mídia" onClick={() => window.open(m.mediaData, '_blank')} /> :
                                                            m.type === 'audio' ?
                                                                <audio controls src={m.mediaData} className="w-full mb-2 max-w-xs" style={{height:'36px'}} /> :
                                                            m.type === 'video' ?
                                                                <video controls src={m.mediaData} className="rounded-lg mb-2 max-w-full max-h-64" /> :
                                                                <div className="flex items-center p-2 bg-black/5 rounded mb-2">
                                                                    <i className="fas fa-file-pdf mr-2 text-red-500"></i>
                                                                    <span className="text-xs truncate">{m.fileName || 'Arquivo'}</span>
                                                                </div>
                                                        ) : ['image','audio','video','document'].includes(m.type) ? (
                                                            <div className="flex items-center p-2 bg-black/5 rounded mb-2 opacity-60">
                                                                <i className={`fas ${m.type==='audio'?'fa-microphone':m.type==='video'?'fa-video':m.type==='image'?'fa-image':'fa-file'} mr-2 text-slate-400`}></i>
                                                                <span className="text-xs text-slate-400">Carregando {m.type}...</span>
                                                            </div>
                                                        ) : null}
                                                        <div className="whitespace-pre-wrap break-words">{m.text || ''}</div>
                                                        <div className={`text-[10px] mt-1 flex items-center justify-end ${m.status === 'failed' ? 'text-red-400' : m.direction === 'sent' ? 'text-purple-200' : 'text-slate-400'}`}>
                                                            {m.timestamp ? new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : ''}
                                                            {m.direction === 'sent' && (
                                                                <span className="ml-1">
                                                                    {m.status === 'failed' ? <i className="fas fa-exclamation-circle text-red-500"></i> :
                                                                     m.status === 'read' ? <i className="fas fa-check-double text-blue-300"></i> : 
                                                                     m.status === 'pending' ? <i className="fas fa-clock text-yellow-300"></i> :
                                                                     <i className="fas fa-check"></i>}
                                                                </span>
                                                            )}
                                                        </div>
                                                        {m.status === 'failed' && m.error && (
                                                            <div className="mt-2 px-3 py-2 bg-red-600 rounded-lg text-[11px] text-white break-words leading-snug font-medium">
                                                                <i className="fas fa-exclamation-circle mr-1"></i>{translateMetaError(m.error)}
                                                            </div>
                                                        )}
                                                    </div>
                                                    {activeReactions.length > 0 && (
                                                        <div style={{display:'flex', gap:'4px', flexWrap:'wrap', marginTop:'3px'}}>
                                                            {activeReactions.map(([emoji]) => (
                                                                <button key={emoji} className="reaction-badge my-reaction" onClick={() => toggleReaction(msgId, emoji)}>
                                                                    <span>{emoji}</span>
                                                                </button>
                                                            ))}
                                                        </div>
                                                    )}
                                                    </div>
                                                </div>
                                                );
                                            })
                                        )}
                                        <div ref={endRef} />
                                    </div>
                                    <div className="chat-composer p-4 bg-white border-t">
                                        {replyTo && (
                                            <div className="mb-2 flex items-start gap-2 p-2 bg-purple-50 border-l-4 border-purple-600 rounded-lg">
                                                <div className="flex-1 min-w-0">
                                                    <div className="text-[10px] font-black text-purple-600 mb-0.5">
                                                        <i className="fas fa-reply mr-1"></i>
                                                        {replyTo.direction === 'sent' ? 'Você' : contact?.name || replyTo.phone}
                                                    </div>
                                                    <div className="text-xs text-slate-600 truncate">{replyTo.text || '[mídia]'}</div>
                                                </div>
                                                <button onClick={() => setReplyTo(null)} className="text-slate-400 hover:text-red-500 flex-shrink-0 mt-0.5">
                                                    <i className="fas fa-times text-xs"></i>
                                                </button>
                                            </div>
                                        )}
                                        {file && (
                                            <div className="mb-3 p-3 bg-purple-50 rounded-xl border flex items-center">
                                                <div className="w-12 h-12 bg-purple-200 rounded flex items-center justify-center mr-3">
                                                    {file.type?.includes('image') ? 
                                                        <img src={file.data} className="w-full h-full object-cover rounded" alt="" /> : 
                                                        <i className="fas fa-file text-purple-600"></i>
                                                    }
                                                </div>
                                                <div className="flex-1 truncate text-sm font-bold">{file.name}</div>
                                                <button onClick={() => setFile(null)} className="p-2 text-red-400">
                                                    <i className="fas fa-times-circle"></i>
                                                </button>
                                            </div>
                                        )}
                                        {showEmoji && (
                                            <div ref={emojiRef} className="emoji-picker-panel">
                                                <div className="flex items-center justify-between mb-2">
                                                    <span className="text-[10px] font-black text-slate-400">EMOJIS</span>
                                                    <button onClick={() => setShowEmoji(false)} className="text-slate-400 hover:text-red-500 text-xs">
                                                        <i className="fas fa-times"></i>
                                                    </button>
                                                </div>
                                                <div className="emoji-grid">
                                                    {EMOJIS.map((emoji, idx) => (
                                                        <button
                                                            key={idx}
                                                            className="emoji-btn"
                                                            onClick={() => insertEmoji(emoji)}
                                                            title={emoji}
                                                        >{emoji}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        <div className="chat-input-row flex items-center gap-2">
                                            <button onClick={() => setShowQr(!showQr)} className={`p-3 rounded-full transition-colors ${showQr?'bg-purple-600 text-white':'bg-slate-100 hover:bg-slate-200'}`} title="Respostas Rápidas">
                                                <i className="fas fa-bolt"></i>
                                            </button>
                                            <button onClick={() => setShowTpl(!showTpl)} className={`p-3 rounded-full transition-colors ${showTpl?'bg-purple-600 text-white':'bg-slate-100 hover:bg-slate-200'}`} title="Templates">
                                                <i className="fas fa-rocket"></i>
                                            </button>
                                            <button onClick={() => fInput.current?.click()} className="p-3 rounded-full bg-slate-100 hover:bg-slate-200 transition-colors" title="Anexar">
                                                <i className="fas fa-paperclip"></i>
                                            </button>
                                            <button
                                                onClick={sendLocation}
                                                disabled={isSendingLocation}
                                                className="p-3 rounded-full bg-slate-100 hover:bg-green-100 hover:text-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                                                title="Compartilhar minha localização"
                                            >
                                                <i className={`fas ${isSendingLocation ? 'fa-circle-notch animate-spin' : 'fa-map-marker-alt'}`}></i>
                                            </button>
                                            <button
                                                onClick={() => setShowEmoji(prev => !prev)}
                                                className={`p-3 rounded-full transition-colors ${showEmoji ? 'bg-purple-600 text-white' : 'bg-slate-100 hover:bg-slate-200'}`}
                                                title="Emojis"
                                            >
                                                <i className="fas fa-smile"></i>
                                            </button>
                                            <input 
                                                type="file" 
                                                ref={fInput} 
                                                className="hidden" 
                                                accept="image/*,.pdf,.doc,.docx"
                                                onChange={e => { 
                                                    const fl = e.target.files[0]; 
                                                    if(fl) processFile(fl).then(setFile);
                                                }} 
                                            />
                                            <input 
                                                type="text"
                                                ref={inputRef}
                                                value={inputText} 
                                                onChange={e => setInputText(e.target.value)} 
                                                onFocus={() => document.body.classList.add('mobile-composer-focused')}
                                                onBlur={() => setTimeout(() => document.body.classList.remove('mobile-composer-focused'), 120)}
                                                onKeyPress={e => e.key === 'Enter' && !isSending && send()} 
                                                placeholder="Digite uma mensagem..." 
                                                className="flex-1 p-3 bg-slate-100 rounded-full outline-none focus:ring-2 focus:ring-purple-500"
                                                autoComplete="off"
                                                autoCorrect="off"
                                                autoCapitalize="sentences"
                                                spellCheck="false"
                                                inputMode="text"
                                                enterKeyHint="send"
                                                name="chat-message"
                                                data-form-type="other"
                                                data-lpignore="true"
                                                data-1p-ignore="true"
                                                disabled={isSending}
                                            />
                                            <button 
                                                onClick={() => send()} 
                                                disabled={isSending || (!inputText && !file)} 
                                                className="p-4 bg-purple-700 text-white rounded-full shadow-lg hover:bg-purple-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                            >
                                                <i className={`fas ${isSending ? 'fa-circle-notch animate-spin' : 'fa-paper-plane'}`}></i>
                                            </button>
                                        </div>
                                        {showQr && (quickReplies || []).length > 0 && (
                                            <div className="mt-3 p-2 bg-slate-50 rounded-xl border grid grid-cols-2 gap-2 max-h-40 overflow-y-auto">
                                                {(quickReplies || []).map(q => (
                                                    <button 
                                                        key={q._id} 
                                                        onClick={() => send(null, q)} 
                                                        className="text-left p-2 bg-white border rounded hover:border-purple-400 transition-colors"
                                                    >
                                                        <div className="font-bold text-xs text-purple-600">/{q.shortcut}</div>
                                                        <div className="text-[10px] text-slate-500 truncate">{q.text}</div>
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                        {showTpl && (templates || []).length > 0 && (
                                            <div className="mt-3 p-2 bg-slate-50 rounded-xl border grid grid-cols-2 gap-2 max-h-40 overflow-y-auto">
                                                {(templates || []).map(t => (
                                                    <button 
                                                        key={t.id || t.name} 
                                                        onClick={() => send(t)} 
                                                        className="text-left p-2 bg-white border rounded hover:border-purple-400 transition-colors"
                                                    >
                                                        <div className="font-bold text-xs truncate">{t.name}</div>
                                                        <div className="text-[10px] text-slate-500 truncate">
                                                            {t.components?.find(c=>c.type==='BODY')?.text?.substring(0, 30) || ''}
                                                        </div>
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </>
                            ) : (
                                <div className="flex-1 flex flex-col items-center justify-center text-slate-400 bg-slate-50">
                                    <i className="fas fa-user-slash text-4xl mb-2"></i>
                                    <p>Contato não encontrado</p>
                                </div>
                            )
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-400 bg-slate-50">
                                <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 shadow-sm">
                                    <i className="fas fa-comments text-3xl text-purple-200"></i>
                                </div>
                                <div className="text-lg font-medium">Selecione uma conversa</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        });

        const BulkView = memo(({ leads, templates, config, onLeadsUpdate }) => {
            const [sel, setSel] = useState([]); 
            const [tpl, setTpl] = useState(null); 
            const [file, setFile] = useState(null); 
            const [busy, setBusy] = useState(false); 
            const [prog, setProg] = useState({c:0, t:0});
            const [filterTag, setFilterTag] = useState(null);
            const fRef = useRef(null);
            const excelRef = useRef(null);
            const [excelLoading, setExcelLoading] = useState(false);
            const [excelResult, setExcelResult] = useState(null);
            const [importedPhones, setImportedPhones] = useState([]);

            const handleExcelImport = async (e) => {
                const f = e.target.files[0];
                if (!f) return;
                e.target.value = '';
                setExcelLoading(true);
                setExcelResult(null);
                try {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        try {
                            // 1. Extrai telefones do Excel
                            const res = await fetch('/api/excel/parse', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ excelData: ev.target.result })
                            });
                            const data = await res.json();
                            if (!res.ok) throw new Error(data.error || 'Erro ao processar');
                            if (data.phones.length === 0) {
                                setExcelResult({ count: 0 });
                                setExcelLoading(false);
                                return;
                            }

                            // 2. Salva como leads no banco (não sobrescreve dados existentes)
                            await fetch('/api/leads/batch', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ phones: data.phones })
                            });

                            // 3. Mostra na lista imediatamente (antes do refresh)
                            setImportedPhones(data.phones);

                            // 4. Adiciona à seleção (sem duplicatas)
                            setSel(prev => Array.from(new Set([...prev, ...data.phones])));

                            setExcelResult({ count: data.phones.length });

                            // 5. Atualiza a lista de leads da sidebar
                            if (onLeadsUpdate) onLeadsUpdate();
                        } catch (err) {
                            alert('Erro ao importar Excel: ' + err.message);
                        }
                        setExcelLoading(false);
                    };
                    reader.readAsDataURL(f);
                } catch (err) {
                    alert('Erro ao ler arquivo: ' + err.message);
                    setExcelLoading(false);
                }
            };

            const tagColors = config?.tagColors || {};
            const availableTags = Object.keys(tagColors);
            const filteredLeads = useMemo(() => {
                const base = filterTag
                    ? (leads || []).filter(l => (l.tags || []).includes(filterTag))
                    : (leads || []);
                // Inclui telefones importados do Excel que ainda não estão na lista de leads
                const existingPhones = new Set(base.map(l => l.phone));
                const extras = importedPhones
                    .filter(p => !existingPhones.has(p))
                    .map(p => ({ phone: p, name: '', tags: [], _fromExcel: true }));
                return [...base, ...extras];
            }, [leads, filterTag, importedPhones]);

            const run = async () => { 
                if(!tpl || sel.length===0 || busy) return; 
                setBusy(true);
                setProg({c:0, t:sel.length, erros:0});

                // Se template tem foto: faz upload UMA vez e reutiliza o mediaId
                let uploadedMediaId = null;
                const hasHeaderImage = tpl.components?.some(c => c.type === 'HEADER' && c.format === 'IMAGE');
                if (hasHeaderImage && file?.data) {
                    try {
                        const upRes = await fetch('/api/media/upload', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ mediaData: file.data, mediaType: file.type, fileName: file.name })
                        });
                        if (!upRes.ok) {
                            const e = await upRes.json().catch(()=>({}));
                            setBusy(false);
                            alert('Erro ao enviar foto para a Meta: ' + (e.error || upRes.status));
                            return;
                        }
                        const upData = await upRes.json();
                        uploadedMediaId = upData.mediaId;
                    } catch(e) {
                        setBusy(false);
                        alert('Erro ao enviar foto: ' + e.message);
                        return;
                    }
                }

                const templateText = tpl.components?.find(c=>c.type==='BODY')?.text || tpl.name;
                const templateLanguage = tpl.language || 'pt_BR';
                let erros = 0;
                const erroDetalhes = [];
                for(let i=0; i<sel.length; i++){
                    try {
                        const res = await fetch('/api/messages/send', {
                            method:'POST',
                            headers:{'Content-Type':'application/json'},
                            body:JSON.stringify({
                                phone: sel[i],
                                templateName: tpl.name,
                                languageCode: templateLanguage,
                                messageText: templateText,
                                mediaId: uploadedMediaId || undefined,
                                mediaType: uploadedMediaId ? file?.type : undefined,
                                mediaData: (!uploadedMediaId && file?.data) ? file.data : undefined,
                                fileName: file?.name
                            })
                        });
                        if (!res.ok) {
                            erros++;
                            try {
                                const errData = await res.json();
                                erroDetalhes.push(`${sel[i]}: ${errData.error || res.status}`);
                            } catch { erroDetalhes.push(`${sel[i]}: HTTP ${res.status}`); }
                        }
                    } catch(e) {
                        console.error('Erro no disparo:', e);
                        erros++;
                        erroDetalhes.push(`${sel[i]}: ${e.message}`);
                    }
                    setProg(p=>({...p, c:i+1, erros}));
                    await new Promise(r=>setTimeout(r, 1000));
                }
                const ok = sel.length - erros;
                const detalhesMsg = erroDetalhes.length > 0 
                    ? `\n\nDetalhes dos erros:\n${erroDetalhes.slice(0,5).join('\n')}${erroDetalhes.length > 5 ? `\n...e mais ${erroDetalhes.length - 5}` : ''}`
                    : '';
                alert(`Concluído!\n✅ ${ok} enviados${erros > 0 ? `\n❌ ${erros} com erro${detalhesMsg}` : ''}`);
                setBusy(false);
                setSel([]);
                setTpl(null);
                setFile(null);
            };

            const getTemplatePreview = (template) => {
                if (!template) return null;
                const bodyComponent = template.components?.find(c => c.type === 'BODY');
                return bodyComponent?.text || 'Sem preview disponível';
            };

            return (
                <div className="p-8 max-w-6xl mx-auto h-full overflow-y-auto">
                    <h2 className="text-2xl font-black mb-6">
                        <i className="fas fa-rocket mr-2 text-purple-600"></i> 
                        Disparo em Massa
                    </h2>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div>
                            <div className="bg-white p-4 rounded-2xl border mb-4">
                                <h3 className="font-bold text-xs text-slate-400 mb-3">1. TEMPLATE</h3>
                                <div className="space-y-2 max-h-60 overflow-y-auto">
                                    {(templates || []).map(t => (
                                        <div 
                                            key={t.id} 
                                            onClick={()=>setTpl(t)} 
                                            className={`p-3 rounded-xl border-2 cursor-pointer transition-all ${tpl?.id===t.id?'border-purple-600 bg-purple-50':'border-slate-50 hover:border-purple-200'}`}
                                        >
                                            <div className="font-bold text-sm">{t.name}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            {tpl && (
                                <div className="bg-purple-50 p-4 rounded-2xl border border-purple-200 mb-4">
                                    <h4 className="font-bold text-xs text-purple-600 mb-2">
                                        <i className="fas fa-eye mr-1"></i> PREVIEW: {tpl.name}
                                    </h4>
                                    <div className="bg-white p-3 rounded-xl text-sm text-slate-700 whitespace-pre-wrap">
                                        {getTemplatePreview(tpl)}
                                    </div>
                                    {tpl.components?.some(c => c.type === 'HEADER' && c.format === 'IMAGE') && (
                                        <div className="mt-3">
                                            <div 
                                                className="bg-white p-4 rounded-2xl border border-dashed border-purple-300 text-center cursor-pointer hover:bg-purple-50 transition-colors" 
                                                onClick={()=>fRef.current.click()}
                                            >
                                                {file ? (
                                                    <img src={file.data} className="w-20 h-20 mx-auto rounded mb-2 object-cover" alt="Preview" />
                                                ) : (
                                                    <i className="fas fa-image text-purple-300 text-2xl mb-2"></i>
                                                )}
                                                <div className="text-xs font-bold text-purple-600">
                                                    {file ? file.name : 'Anexar Foto ao Template'}
                                                </div>
                                                <input 
                                                    type="file" 
                                                    ref={fRef} 
                                                    className="hidden" 
                                                    accept="image/*"
                                                    onChange={e=>{
                                                        const f=e.target.files[0];
                                                        if(f) processFile(f).then(setFile);
                                                    }}
                                                />
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                        <div>
                            <div className="bg-white p-4 rounded-2xl border mb-4">
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="font-bold text-xs text-slate-400">2. LEADS ({sel.length} selecionados / {filteredLeads.length} exibidos)</h3>
                                    <div className="flex gap-2 items-center">
                                        <button onClick={()=>setSel([])} className="text-[10px] font-bold text-slate-400 hover:text-slate-600">Nenhum</button>
                                        <button onClick={()=>setSel(filteredLeads.map(l=>l.phone))} className="text-[10px] font-bold text-purple-600 hover:text-purple-800">Todos visíveis</button>
                                        <button
                                            onClick={()=>excelRef.current.click()}
                                            disabled={excelLoading}
                                            className="flex items-center gap-1 px-2 py-1 rounded-lg bg-green-50 text-green-700 border border-green-200 text-[10px] font-bold hover:bg-green-100 transition-colors disabled:opacity-50"
                                            title="Importar telefones de planilha Excel"
                                        >
                                            {excelLoading
                                                ? <><i className="fas fa-spinner fa-spin"></i> Lendo...</>
                                                : <><i className="fas fa-file-excel"></i> Importar Excel</>
                                            }
                                        </button>
                                        <input
                                            type="file"
                                            ref={excelRef}
                                            className="hidden"
                                            accept=".xlsx,.xls,.csv"
                                            onChange={handleExcelImport}
                                        />
                                    </div>
                                </div>
                                {excelResult && (
                                    <div className={`mb-3 px-3 py-2 rounded-xl text-[11px] font-bold flex items-center gap-2 ${excelResult.count === 0 ? 'bg-yellow-50 text-yellow-700 border border-yellow-200' : 'bg-green-50 text-green-700 border border-green-200'}`}>
                                        {excelResult.count === 0
                                            ? <><i className="fas fa-exclamation-circle"></i> Nenhum telefone brasileiro válido encontrado na planilha.</>
                                            : <><i className="fas fa-check-circle"></i> {excelResult.count} telefone{excelResult.count > 1 ? 's' : ''} importado{excelResult.count > 1 ? 's' : ''} e adicionado{excelResult.count > 1 ? 's' : ''} à seleção.</>
                                        }
                                        <button onClick={()=>setExcelResult(null)} className="ml-auto text-current opacity-50 hover:opacity-100"><i className="fas fa-times"></i></button>
                                    </div>
                                )}
                                {availableTags.length > 0 && (
                                    <div className="mb-3 flex flex-wrap gap-1">
                                        <button
                                            onClick={()=>setFilterTag(null)}
                                            className={`px-2 py-1 rounded-full text-[10px] font-bold border transition-all ${!filterTag ? 'bg-purple-600 text-white border-purple-600' : 'bg-white text-slate-500 border-slate-200 hover:border-purple-300'}`}
                                        >Todas</button>
                                        {availableTags.map(tag => (
                                            <button
                                                key={tag}
                                                onClick={()=>setFilterTag(prev => prev===tag ? null : tag)}
                                                className={`px-2 py-1 rounded-full text-[10px] font-bold border transition-all ${filterTag===tag ? 'text-white border-transparent' : 'bg-white text-slate-600 border-slate-200 hover:border-purple-300'}`}
                                                style={filterTag===tag ? {backgroundColor: tagColors[tag], borderColor: tagColors[tag]} : {}}
                                            >
                                                <span style={filterTag!==tag ? {color: tagColors[tag]} : {}}>{tag}</span>
                                            </button>
                                        ))}
                                    </div>
                                )}
                                <div className="grid grid-cols-1 gap-2 max-h-60 overflow-y-auto">
                                    {filteredLeads.map(l => (
                                        <div 
                                            key={l.phone} 
                                            onClick={()=>setSel(prev=>prev.includes(l.phone)?prev.filter(p=>p!==l.phone):[...prev, l.phone])} 
                                            className={`p-3 rounded-xl border cursor-pointer text-xs flex items-center justify-between transition-all ${sel.includes(l.phone)?'border-purple-600 bg-purple-50':'bg-slate-50 hover:bg-slate-100'}`}
                                        >
                                            <div className="flex items-center">
                                                <div className={`w-3 h-3 rounded-full mr-3 flex-shrink-0 ${sel.includes(l.phone)?'bg-purple-600':'bg-slate-300'}`}></div>
                                                <div>
                                                    <div className="font-bold text-slate-800 flex items-center gap-1">
                                                        {l.name || <span className="text-slate-400 font-normal italic text-[11px]">sem nome</span>}
                                                        {l._fromExcel && <span className="text-[9px] bg-green-100 text-green-700 border border-green-200 rounded px-1 font-bold">Excel</span>}
                                                    </div>
                                                    <div className="text-[10px] text-slate-500 font-mono">{l.phone}</div>
                                                    {(l.tags || []).length > 0 && (
                                                        <div className="flex flex-wrap gap-1 mt-1">
                                                            {l.tags.map(t => (
                                                                <span key={t} className="tag-badge" style={{backgroundColor: tagColors[t] || '#e2e8f0', color: '#fff', fontSize: '9px'}}>{t}</span>
                                                            ))}
                                                        </div>
                                                    )}
